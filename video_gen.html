<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>视频生成 · Veo</title>
  <style>
    :root {
      --bg: #0f1218;
      --surface: #171b24;
      --surface2: #1e2430;
      --border: #2a3344;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #5b8cff;
      --accent-dim: #3d6fd9;
      --success: #3dd68c;
      --danger: #ff6b6b;
      --radius: 12px;
      --font: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a2744 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.75fr) minmax(280px, 0.95fr);
      gap: 20px;
      align-items: stretch;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      min-height: 0;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    /* Prompt 主编辑区：占更大可视区域 */
    textarea#prompt {
      min-height: 320px;
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .field-prompt {
      margin-bottom: 18px;
    }

    .field-prompt label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.2);
    }

    .field {
      margin-bottom: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 520px) {
      .row {
        grid-template-columns: 1fr;
      }
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface2);
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(91, 140, 255, 0.06);
    }

    .upload-zone input {
      display: none;
    }

    .upload-zone p {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .thumbs img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .checks label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
    }

    .checks input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      font-family: inherit;
      font-size: 0.95rem;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s, transform 0.05s;
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: #fff;
    }

    button.primary:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    button.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 运行日志：紧凑条带，不抢主界面 */
    .info-section {
      margin-bottom: 14px;
    }

    .info-section > label {
      font-size: 0.72rem;
      margin-bottom: 4px;
      color: var(--muted);
    }

    .info-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 0.7rem;
      line-height: 1.45;
      color: #aeb6c2;
      max-height: 88px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .info-box .line {
      margin: 0 0 4px;
    }

    .info-box .line.ok {
      color: var(--success);
    }

    .info-box .line.err {
      color: var(--danger);
    }

    .preview-wrap {
      background: #0a0c10;
      border-radius: 8px;
      border: 1px solid var(--border);
      min-height: 280px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .preview-wrap video {
      max-width: 100%;
      max-height: min(420px, 55vh);
      display: block;
    }

    /* 右侧栏：日志在上（矮）、预览在下（优先高度） */
    .card-preview {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card-preview .field-preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      margin-bottom: 0;
    }

    .card-preview .field-preview > label {
      margin-bottom: 8px;
    }

    .preview-placeholder {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 24px;
      text-align: center;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    a.download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 10px 18px;
      background: var(--success);
      color: #0a1620;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    a.download-btn:hover {
      filter: brightness(1.05);
    }

    a.download-btn[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>视频生成</h1>
      <p>上传参考图、填写提示词与参数，创建任务并轮询直至完成。请在下方填写 API 地址与密钥（勿将密钥提交到公开仓库）。</p>
    </header>

    <div class="grid">
      <div class="card">
        <h2>请求配置</h2>
        <div class="field field-prompt">
          <label for="prompt">Prompt</label>
          <textarea id="prompt" placeholder="描述要生成的视频内容、镜头与风格…"></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label for="apiBase">API 主机（不含路径）</label>
            <input type="url" id="apiBase" value="https://yunwu.ai" placeholder="https://yunwu.ai" />
          </div>
          <div class="field">
            <label for="apiKey">Bearer Token</label>
            <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" />
          </div>
        </div>
        <div class="field">
          <label>参考图片（可多选，将转为 data URL 传入 images）</label>
          <div class="upload-zone" id="dropZone">
            <input type="file" id="fileInput" accept="image/*" multiple />
            <p>点击或拖拽图片到此处</p>
            <div class="thumbs" id="thumbs"></div>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="model">模型 model</label>
            <select id="model">
              <option value="veo3-fast-frames" selected>veo3-fast-frames</option>
              <option value="veo3">veo3</option>
            </select>
          </div>
          <div class="field">
            <label for="aspect">宽高比 aspect_ratio</label>
            <select id="aspect">
              <option value="9:16" selected>9:16（竖屏）</option>
              <option value="16:9">16:9（横屏）</option>
              <option value="1:1">1:1</option>
              <option value="4:3">4:3</option>
              <option value="3:4">3:4</option>
            </select>
          </div>
        </div>
        <div class="field checks">
          <label><input type="checkbox" id="enhance" checked /> enhance_prompt</label>
          <label><input type="checkbox" id="upsample" checked /> enable_upsample</label>
        </div>
        <div class="field">
          <label for="maxRetries">失败后最多重试次数（不含首次提交；达到上限后停止）</label>
          <input type="number" id="maxRetries" min="0" max="30" value="3" step="1" />
          <p class="hint">创建任务失败、无 task_id、轮询报错或任务状态为 failed/error 时会自动从头再跑。</p>
        </div>
        <div class="row">
          <div class="field">
            <label for="runMode">运行模式</label>
            <select id="runMode">
              <option value="single">单段（默认）</option>
              <option value="continuation" selected>续接两段（2 x 8s）</option>
            </select>
          </div>
          <div class="field">
            <label for="seg2Retries">第二段失败重试次数</label>
            <input type="number" id="seg2Retries" min="0" max="10" value="1" step="1" />
          </div>
        </div>
        <div class="field">
          <label for="continuationSuffix">续接补充提示词（自动拼接到第二段 Prompt）</label>
          <textarea id="continuationSuffix">请无缝承接上一段末帧继续拍摄，主体、服饰、场景保持一致，动作自然延续。</textarea>
          <p class="hint">续接模式下会把第一段末帧作为第二段首图输入。</p>
        </div>
        <div class="actions">
          <button type="button" class="primary" id="btnRun">生成视频</button>
          <button type="button" class="secondary" id="btnClearLog">清空日志</button>
        </div>
        <p class="hint">若浏览器因 CORS 无法直连 API，请用本地反向代理或扩展放行跨域。</p>
      </div>

      <div class="card card-preview">
        <h2>预览与日志</h2>
        <div class="info-section">
          <label>运行日志</label>
          <div class="info-box" id="infoBox"></div>
        </div>
        <div class="field field-preview">
          <label>预览</label>
          <div class="preview-wrap" id="previewWrap">
            <div class="preview-placeholder" id="previewPlaceholder">生成完成后将在此播放视频</div>
            <video id="previewVideo" controls playsinline hidden></video>
          </div>
          <a class="download-btn" id="btnDownload" href="#" download hidden>下载视频</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const apiBase = document.getElementById("apiBase");
      const apiKey = document.getElementById("apiKey");
      const promptEl = document.getElementById("prompt");
      const fileInput = document.getElementById("fileInput");
      const dropZone = document.getElementById("dropZone");
      const thumbs = document.getElementById("thumbs");
      const modelEl = document.getElementById("model");
      const aspectEl = document.getElementById("aspect");
      const enhanceEl = document.getElementById("enhance");
      const upsampleEl = document.getElementById("upsample");
      const maxRetriesEl = document.getElementById("maxRetries");
      const runModeEl = document.getElementById("runMode");
      const seg2RetriesEl = document.getElementById("seg2Retries");
      const continuationSuffixEl = document.getElementById("continuationSuffix");
      const infoBox = document.getElementById("infoBox");
      const btnRun = document.getElementById("btnRun");
      const btnClearLog = document.getElementById("btnClearLog");
      const previewWrap = document.getElementById("previewWrap");
      const previewPlaceholder = document.getElementById("previewPlaceholder");
      const previewVideo = document.getElementById("previewVideo");
      const btnDownload = document.getElementById("btnDownload");

      /** @type {{ dataUrl: string, name: string }[]} */
      let imageItems = [];

      function log(msg, type) {
        const line = document.createElement("div");
        line.className = "line" + (type === "ok" ? " ok" : type === "err" ? " err" : "");
        const t = new Date().toLocaleTimeString();
        line.textContent = "[" + t + "] " + msg;
        infoBox.appendChild(line);
        infoBox.scrollTop = infoBox.scrollHeight;
      }

      function clearLog() {
        infoBox.innerHTML = "";
      }

      function renderThumbs() {
        thumbs.innerHTML = "";
        imageItems.forEach((item, i) => {
          const img = document.createElement("img");
          img.src = item.dataUrl;
          img.alt = item.name;
          img.title = item.name;
          img.onclick = function (e) {
            e.stopPropagation();
            imageItems.splice(i, 1);
            renderThumbs();
          };
          thumbs.appendChild(img);
        });
      }

      function fileToDataUrl(file) {
        return new Promise(function (resolve, reject) {
          const r = new FileReader();
          r.onload = function () {
            resolve(r.result);
          };
          r.onerror = reject;
          r.readAsDataURL(file);
        });
      }

      async function addFiles(fileList) {
        const arr = Array.from(fileList || []).filter(function (f) {
          return f.type.startsWith("image/");
        });
        for (let i = 0; i < arr.length; i++) {
          const dataUrl = await fileToDataUrl(arr[i]);
          imageItems.push({ dataUrl: dataUrl, name: arr[i].name });
        }
        renderThumbs();
      }

      dropZone.addEventListener("click", function (e) {
        if (e.target === dropZone || e.target.closest("p")) {
          fileInput.click();
        }
      });

      fileInput.addEventListener("change", function () {
        addFiles(fileInput.files);
        fileInput.value = "";
      });

      dropZone.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", function () {
        dropZone.classList.remove("dragover");
      });
      dropZone.addEventListener("drop", function (e) {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        addFiles(e.dataTransfer.files);
      });

      function baseUrl() {
        let u = (apiBase.value || "").trim().replace(/\/+$/, "");
        return u || "https://yunwu.ai";
      }

      function resetPreview() {
        previewVideo.pause();
        previewVideo.removeAttribute("src");
        previewVideo.hidden = true;
        previewPlaceholder.hidden = false;
        btnDownload.hidden = true;
        btnDownload.removeAttribute("href");
      }

      function showPreview(url) {
        previewPlaceholder.hidden = true;
        previewVideo.hidden = false;
        previewVideo.src = url;
        btnDownload.href = url;
        btnDownload.download = "video.mp4";
        btnDownload.hidden = false;
      }

      function sleep(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      function parseMaxRetries() {
        const n = parseInt((maxRetriesEl && maxRetriesEl.value) || "0", 10);
        if (isNaN(n) || n < 0) {
          return 0;
        }
        return Math.min(30, n);
      }

      function parseSeg2Retries() {
        const n = parseInt((seg2RetriesEl && seg2RetriesEl.value) || "0", 10);
        if (isNaN(n) || n < 0) {
          return 0;
        }
        return Math.min(10, n);
      }

      async function createVideo(payload) {
        const res = await fetch(baseUrl() + "/v1/video/create", {
          method: "POST",
          headers: {
            Accept: "application/json",
            Authorization: "Bearer " + (apiKey.value || "").trim(),
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });
        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (_) {
          throw new Error("创建任务响应非 JSON: " + text.slice(0, 200));
        }
        if (!res.ok) {
          throw new Error((data && (data.message || data.error)) || "HTTP " + res.status);
        }
        return data;
      }

      async function queryVideo(taskId) {
        const res = await fetch(baseUrl() + "/v1/video/query?id=" + encodeURIComponent(taskId), {
          headers: {
            Accept: "application/json",
            Authorization: "Bearer " + (apiKey.value || "").trim(),
          },
        });
        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (_) {
          throw new Error("查询响应非 JSON: " + text.slice(0, 200));
        }
        if (!res.ok) {
          throw new Error((data && (data.message || data.error)) || "HTTP " + res.status);
        }
        return data;
      }

      function pickVideoUrl(result) {
        return (
          result.video_url ||
          result.url ||
          (result.output && result.output.video_url) ||
          null
        );
      }

      async function extractLastFrameDataUrl(videoUrl) {
        const video = document.createElement("video");
        video.crossOrigin = "anonymous";
        video.preload = "auto";
        video.muted = true;
        video.playsInline = true;

        await new Promise(function (resolve, reject) {
          video.onloadedmetadata = resolve;
          video.onerror = function () {
            reject(new Error("第一段视频元数据读取失败，无法提取末帧"));
          };
          video.src = videoUrl;
        });

        const targetTime = Math.max(0, (video.duration || 0) - 0.05);
        await new Promise(function (resolve, reject) {
          video.onseeked = resolve;
          video.onerror = function () {
            reject(new Error("第一段视频 seek 失败，无法提取末帧"));
          };
          video.currentTime = targetTime;
        });

        const canvas = document.createElement("canvas");
        canvas.width = Math.max(2, video.videoWidth || 720);
        canvas.height = Math.max(2, video.videoHeight || 1280);
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          throw new Error("无法创建 Canvas 上下文");
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/jpeg", 0.92);
      }

      async function runSingle(payload) {
        log("提交单段任务…");
        const created = await createVideo(payload);
        log("创建响应: " + JSON.stringify(created));
        const taskId = created.task_id || created.id;
        if (!taskId) {
          throw new Error("未获取 task_id / id");
        }
        log("任务 ID: " + taskId);
        const out = await waitForVideo(taskId);
        if (!out.videoUrl) {
          throw new Error("单段任务失败");
        }
        return out.videoUrl;
      }

      async function runContinuation(payload) {
        log("提交第1段任务…");
        const created1 = await createVideo(payload);
        log("[segment1] 创建响应: " + JSON.stringify(created1));
        const taskId1 = created1.task_id || created1.id;
        if (!taskId1) {
          throw new Error("[segment1] 未获取 task_id / id");
        }
        log("[segment1] 任务 ID: " + taskId1);
        const seg1 = await waitForVideo(taskId1);
        if (!seg1.videoUrl) {
          throw new Error("[segment1] 失败");
        }

        log("[segment1] 提取末帧中…");
        const lastFrameDataUrl = await extractLastFrameDataUrl(seg1.videoUrl);
        log("[segment1] 末帧提取完成");

        const suffix = (continuationSuffixEl.value || "").trim();
        const payload2 = {
          prompt: payload.prompt + (suffix ? "\n\n" + suffix : ""),
          model: payload.model,
          images: [lastFrameDataUrl],
          enhance_prompt: payload.enhance_prompt,
          enable_upsample: payload.enable_upsample,
          aspect_ratio: payload.aspect_ratio,
        };

        const maxTry = parseSeg2Retries();
        for (let i = 0; i <= maxTry; i++) {
          if (i > 0) {
            log("[segment2] 第 " + i + " 次重试…");
          } else {
            log("提交第2段任务…");
          }
          const created2 = await createVideo(payload2);
          log("[segment2] 创建响应: " + JSON.stringify(created2));
          const taskId2 = created2.task_id || created2.id;
          if (!taskId2) {
            if (i === maxTry) {
              throw new Error("[segment2] 未获取 task_id / id");
            }
            continue;
          }
          log("[segment2] 任务 ID: " + taskId2);
          const seg2 = await waitForVideo(taskId2);
          if (seg2.videoUrl) {
            log("续接完成：当前返回第2段 URL（浏览器端不做无损拼接）", "ok");
            return seg2.videoUrl;
          }
          if (i === maxTry) {
            throw new Error("[segment2] 连续失败，已达到重试上限");
          }
        }

        throw new Error("[segment2] 未成功生成");
      }

      async function waitForVideo(taskId) {
        let interval = 1000;
        while (true) {
          await new Promise(function (r) {
            setTimeout(r, interval);
          });
          const result = await queryVideo(taskId);
          const status = (result.status || "").toLowerCase();
          log("当前状态: " + status);
          if (status === "succeeded" || status === "completed" || status === "success") {
            const videoUrl = pickVideoUrl(result);
            log("完成: " + (videoUrl || "(无 URL 字段)"), "ok");
            return { videoUrl: videoUrl, raw: result };
          }
          if (status === "failed" || status === "error") {
            log("任务失败: " + JSON.stringify(result), "err");
            return { videoUrl: null, raw: result };
          }
        }
      }

      btnClearLog.addEventListener("click", clearLog);

      btnRun.addEventListener("click", async function () {
        const key = (apiKey.value || "").trim();
        if (!key) {
          log("请填写 Bearer Token", "err");
          return;
        }
        const prompt = (promptEl.value || "").trim();
        if (!prompt) {
          log("请填写 Prompt", "err");
          return;
        }
        const images = imageItems.map(function (x) {
          return x.dataUrl;
        });
        if (images.length === 0) {
          log("请至少上传一张参考图（与 Python 示例一致）", "err");
          return;
        }

        resetPreview();
        btnRun.disabled = true;

        const payload = {
          prompt: prompt,
          model: modelEl.value,
          images: images,
          enhance_prompt: enhanceEl.checked,
          enable_upsample: upsampleEl.checked,
          aspect_ratio: aspectEl.value,
        };

        try {
          const mode = runModeEl.value || "single";
          const maxRetries = parseMaxRetries();
          let finalUrl = null;

          for (let attempt = 0; attempt <= maxRetries; attempt++) {
            if (attempt > 0) {
              log("整次流程重试第 " + attempt + " 次…");
            }
            try {
              if (mode === "continuation") {
                finalUrl = await runContinuation(payload);
              } else {
                finalUrl = await runSingle(payload);
              }
              break;
            } catch (innerErr) {
              log(String(innerErr.message || innerErr), "err");
              if (attempt === maxRetries) {
                throw innerErr;
              }
            }
          }

          if (finalUrl) {
            showPreview(finalUrl);
            log("流程结束，已更新预览", "ok");
          }
        } catch (e) {
          log(String(e.message || e), "err");
        } finally {
          btnRun.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
